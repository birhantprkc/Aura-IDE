[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aura"
version = "0.1.0"
description = "Aura — desktop chat troubleshooter for code, powered by DeepSeek V4."
requires-python = ">=3.10"
dependencies = [
    "PySide6>=6.6",
    "openai>=1.40",
    "pydantic>=2.5",
    "platformdirs>=4.0",
    "pillow>=10.0",
    "pygments>=2.17",
]

[project.scripts]
aura = "aura.__main__:main"

[tool.setuptools.packages.find]
include = ["aura*"]
exclude = ["scripts*", "tests*"]
